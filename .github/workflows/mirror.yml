name: Mirror to capitolino/MyAgents

on:
  push:
    branches:
      - dev
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Rewrite repo references for mirror
        run: |
          # Replace source repo references with mirror repo references in the files
          # that users actually read or that the CLI uses at runtime
          sed -i 's|Unit4-Engineering-Labs/IO_Agents|capitolino/MyAgents|g' \
            README.md \
            bin/vs-framework.js \
            .github/copilot-instructions.md

          # Stage and commit the rewritten files on a detached HEAD
          # so the mirror gets the right content without polluting the source repo
          git config user.email "mirror-bot@github-actions"
          git config user.name "Mirror Bot"
          git add README.md bin/vs-framework.js .github/copilot-instructions.md
          git diff --cached --quiet || git commit -m "chore(mirror): rewrite repo references for capitolino/MyAgents"

      - name: Push branch to mirror repo
        run: |
          git config --global credential.helper ""
          git remote add mirror https://capitolino:${{ secrets.MIRROR_PAT }}@github.com/capitolino/MyAgents.git
          git push mirror ${{ github.ref_name }} --force
